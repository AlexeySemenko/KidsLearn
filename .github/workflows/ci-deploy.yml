name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FLY_APP_NAME: "kidslearn"

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build & test backend
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/HelloWorld.Api
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # Add "dotnet test" here once you have a test project
      # - name: Test
      #   run: dotnet test --no-build -c Release

  # ─────────────────────────────────────────────────────────────
  # 2. Build & test frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to Fly.io (only on main)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate Fly.io configuration
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "FLY_API_TOKEN is empty or missing."
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          fi

          if [ -z "${FLY_APP_NAME}" ]; then
            echo "FLY_APP_NAME is empty or missing in workflow env."
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ env.FLY_APP_NAME }}

      - name: Verify Fly.io authentication
        run: flyctl auth whoami
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy backend
        run: flyctl deploy --remote-only --config backend/HelloWorld.Api/fly.toml --app "${FLY_APP_NAME}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ env.FLY_APP_NAME }}

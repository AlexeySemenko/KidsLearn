version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kidslearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/KidsLearn.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Database=kidslearn;Username=postgres;Password=postgres"
      AllowedOrigins__0: "http://localhost:5173"
      AllowedOrigins__1: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

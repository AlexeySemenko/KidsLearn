services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kidslearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/KidsLearn.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Postgres: "Host=postgres;Database=kidslearn;Username=postgres;Password=postgres"
      AllowedOrigins__0: "http://localhost:5173"
      AllowedOrigins__1: "http://localhost:3000"
      Jwt__Key: "dev-super-secret-key-change-in-production-32chars"
      Jwt__Issuer: "KidsLearn.Api"
      Jwt__Audience: "KidsLearn.Client"
      Jwt__AccessTokenExpirationMinutes: "30"
      Jwt__RefreshTokenExpirationDays: "14"
      GoogleAuth__ClientId: "${GOOGLE_AUTH_CLIENT_ID:-}"
      GoogleAuth__ClientSecret: "${GOOGLE_AUTH_CLIENT_SECRET:-}"
      GoogleAuth__RedirectUri: "${GOOGLE_AUTH_REDIRECT_URI:-http://localhost:8080/api/v1/auth/google/callback}"
      GoogleAuth__FrontendCallbackUrl: "${GOOGLE_AUTH_FRONTEND_CALLBACK_URL:-http://localhost:5173/login/parent/google/callback}"
      OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
      OpenAI__Model: "${OPENAI_MODEL:-gpt-4o-mini}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
